name: "Build & Release"   # You can name it as you want

on:
  push:
    # Pattern matched against refs/tags
    tags:
      - '*'

permissions:
  contents: write

jobs:  # Telling what jobs we need to happen
  build-macos-mobile:      # Specify the building name and machine
    name: Build & Release macOs & mobile  # you can name the build whatever you want
    runs-on: macos-latest # here we selected macos-latest to be able to get ios build
    env:
      ANDROID_KEYSTORE: ${{ github.workspace }}/android/keystore/rollfeathers-release.keystore
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml # path to pubspec.yaml
      - run: flutter pub get
      - run: flutter test
      - name: Prepare Android signing
        run: |
          mkdir -p android/keystore
          echo "$ANDROID_KEYSTORE_B64" | base64 -D > android/keystore/rollfeathers-release.keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}

      - name: Build Android (signed)
        run: |
          flutter build apk --release --build-number "$GITHUB_RUN_NUMBER"
          flutter build appbundle --release --build-number "$GITHUB_RUN_NUMBER"
      - name: create-dmg install
        run: |
          echo "Install create-dmg"
          brew install create-dmg
      - name: Rename Android artifacts
        run: |
          mkdir -p build/app/outputs/apk/release
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/apk/release/roll_feathers-${GITHUB_REF_NAME}-release.apk
          # Explicitly rename AAB to a stable, versioned filename too
          mkdir -p build/app/outputs/bundle/release
          if [ -f build/app/outputs/bundle/release/roll_feathers-${GITHUB_REF_NAME}-release.aab ]; then
            # Already versioned by Gradle/Flutter; nothing to do
            echo "AAB already named roll_feathers-${GITHUB_REF_NAME}-release.aab"
          elif [ -f build/app/outputs/bundle/release/app-release.aab ]; then
            mv build/app/outputs/bundle/release/app-release.aab \
               build/app/outputs/bundle/release/roll_feathers-${GITHUB_REF_NAME}-release.aab
          else
            echo "Could not find AAB output to rename" >&2; exit 1
          fi
      - run: flutter build macos --release
      - run: create-dmg --hdiutil-quiet --window-size 400 200 --icon-size 100 --icon "Roll Feathers.app" 50 50 --app-drop-link 200 50 rollFeathersInstaller-${{ github.ref_name }}-release.dmg "build/macos/Build/Products/Release/Roll Feathers.app"
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            build/app/outputs/apk/release/roll_feathers-${{ github.ref_name }}-release.apk
            build/app/outputs/bundle/release/roll_feathers-${{ github.ref_name }}-release.aab
            rollFeathersInstaller-${{ github.ref_name }}-release.dmg

  build-windows:
    needs: build-macos-mobile
    name: Build and Release Windows
    runs-on: windows-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml # path to pubspec.yaml
      - run: flutter pub get
      - run: flutter build windows --release
      - run: dart run inno_bundle:build  --release
      - name: Update release
        env:
          GITHUB_TOKEN: ${{ github.TOKEN }}
        run: |
          Compress-Archive -Path  build\windows\x64\runner\Release\* -Destination rollFeathers-${{github.ref_name}}.zip
          gh release upload ${{ github.ref_name }} rollFeathers-${{github.ref_name}}.zip
          gh release upload ${{ github.ref_name }} build\windows\x64\installer\Release\RollFeathers-x86_64-${{ github.ref_name }}-Installer.exe
